<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Price Swipe Cards</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --card: #fffaf3;
      --text: #1e1b18;
      --muted: #786f65;
      --line: #e4d9cb;
      --shadow: 0 12px 30px rgba(0,0,0,.10);
      --radius: 28px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; }
    body { display: flex; justify-content: center; }
    .app { width: 100%; max-width: 520px; min-height: 100dvh; display: flex; flex-direction: column; padding: calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 16px); }
    .deck { flex: 1; position: relative; min-height: 560px; display: flex; align-items: center; justify-content: center; }
    .card {
      width: 100%; min-height: min(76dvh, 720px); background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,.04);
      position: absolute; inset: 0; padding: 22px 20px 26px; display: flex; flex-direction: column; user-select: none; touch-action: pan-y;
      transition: transform .18s ease, opacity .18s ease; z-index: 1;
    }
    .card.peek { transform: scale(.985) translateY(10px); opacity: .55; z-index: 0; pointer-events: none; }
    .count { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 14px; font-weight: 700; letter-spacing: .02em; }
    .name { font-size: clamp(28px, 5.2vw, 42px); line-height: 1.08; font-weight: 800; text-align: center; margin: 6px 0 18px; word-break: break-word; }
    .hint { text-align: center; color: var(--muted); font-size: 18px; font-weight: 700; margin-bottom: 26px; }
    .prices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: auto; }
    .priceBox { background: rgba(255,255,255,.65); border: 1px solid var(--line); border-radius: 22px; padding: 18px 12px 22px; min-height: 210px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .arrow { font-size: 36px; line-height: 1; margin-bottom: 8px; }
    .label { font-size: 16px; font-weight: 800; letter-spacing: .02em; margin-bottom: 12px; }
    .price { font-size: clamp(32px, 8vw, 48px); font-weight: 900; line-height: 1; }
    .footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    button { appearance: none; border: 0; border-radius: 18px; min-height: 62px; font-size: 20px; font-weight: 800; cursor: pointer; }
    .secondary { background: #e8dfd3; color: var(--text); }
    .primary { background: #1f1a17; color: white; }
    .empty { display: none; flex: 1; align-items: center; justify-content: center; text-align: center; padding: 24px; font-size: 28px; font-weight: 800; }
    .toast { position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 94px); transform: translateX(-50%); background: rgba(31,26,23,.92); color: white; padding: 12px 16px; border-radius: 999px; font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none; transition: opacity .18s ease; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="app">
    <div class="deck" id="deck"></div>
    <div class="empty" id="empty">All cards done.</div>
    <div class="footer">
      <button class="secondary" id="undoBtn">Undo</button>
      <button class="primary" id="saveBtn">Save</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>

let index = 0;
const decisions = new Array(rows.length).fill(null);
const history = [];
const deck = document.getElementById('deck');
const emptyEl = document.getElementById('empty');
const toast = document.getElementById('toast');

function saveState() {
  localStorage.setItem('priceSwipeIndex', index);
  localStorage.setItem('priceSwipeDecisions', JSON.stringify(decisions));
}

function loadState() {
  const savedIndex = localStorage.getItem('priceSwipeIndex');
  const savedDecisions = localStorage.getItem('priceSwipeDecisions');
  if (savedIndex !== null) index = parseInt(savedIndex, 10);
  if (savedDecisions !== null) {
    const loaded = JSON.parse(savedDecisions);
    for (let i = 0; i < loaded.length && i < decisions.length; i++) {
      decisions[i] = loaded[i];
    }
  }
}

function money(v) {
  const n = Number(v);
  return Number.isFinite(n) ? `$${n.toFixed(2)}` : String(v ?? '');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast.t);
  showToast.t = setTimeout(() => toast.classList.remove('show'), 1400);
}

function currentRowsRemaining() {
  while (index < rows.length && decisions[index] !== null) index++;
  return index < rows.length;
}

function decisionFor(dir, row) {
  return dir === 'left'
    ? { decision: 'Fourth', chosenLocation: 'Fourth', chosenPrice: row['Fourth Price'] }
    : { decision: 'Foothill', chosenLocation: 'Foothill', chosenPrice: row['Foothill Price'] };
}

function applyDecision(i, dir) {
  const row = rows[i];
  decisions[i] = decisionFor(dir, row);
  history.push(i);
  index = i + 1;
  saveState();
  render();
}

function undo() {
  if (!history.length) return;
  const i = history.pop();
  decisions[i] = null;
  index = i;
  saveState();
  render();
}

function buildCard(i, peeking=false) {
  const row = rows[i];
  const card = document.createElement('div');
  card.className = 'card' + (peeking ? ' peek' : '');
  card.innerHTML = `
    <div class="count">${i + 1} / ${rows.length}</div>
    <div class="name">${row['Foothill'] || ''}</div>
    <div class="hint">swipe for price</div>
    <div class="prices">
      <div class="priceBox">
        <div class="arrow">←</div>
        <div class="label">Fourth</div>
        <div class="price">${money(row['Fourth Price'])}</div>
      </div>
      <div class="priceBox">
        <div class="arrow">→</div>
        <div class="label">Foothill</div>
        <div class="price">${money(row['Foothill Price'])}</div>
      </div>
    </div>`;
  return card;
}

function attachSwipe(card, i) {
  let startX = 0, startY = 0, dx = 0, dragging = false;
  const threshold = 90;

  function moveCard() {
    const rot = dx * 0.04;
    card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
  }

  card.addEventListener('pointerdown', (e) => {
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    dx = 0;
    card.setPointerCapture(e.pointerId);
    card.style.transition = 'none';
  });

  card.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const mx = e.clientX - startX;
    const my = e.clientY - startY;
    if (Math.abs(my) > Math.abs(mx) && Math.abs(mx) < 14) return;
    dx = mx;
    moveCard();
  });

  function finish() {
    if (!dragging) return;
    dragging = false;
    card.style.transition = 'transform .18s ease, opacity .18s ease';
    if (dx <= -threshold) {
      card.style.transform = 'translateX(-140vw) rotate(-20deg)';
      card.style.opacity = '0';
      setTimeout(() => applyDecision(i, 'left'), 140);
    } else if (dx >= threshold) {
      card.style.transform = 'translateX(140vw) rotate(20deg)';
      card.style.opacity = '0';
      setTimeout(() => applyDecision(i, 'right'), 140);
    } else {
      dx = 0;
      card.style.transform = 'translateX(0) rotate(0)';
    }
  }

  card.addEventListener('pointerup', finish);
  card.addEventListener('pointercancel', finish);
}

function render() {
  deck.innerHTML = '';
  const hasNext = currentRowsRemaining();
  emptyEl.style.display = hasNext ? 'none' : 'flex';
  deck.style.display = hasNext ? 'flex' : 'none';
  if (!hasNext) return;
  const top = buildCard(index, false);
  attachSwipe(top, index);
  deck.appendChild(top);
  let j = index + 1;
  while (j < rows.length && decisions[j] !== null) j++;
  if (j < rows.length) deck.appendChild(buildCard(j, true));
}

function csvEscape(value) {
  const s = String(value ?? '');
  return /["\n,]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

async function saveFile() {
  const headers = [...Object.keys(rows[0]), 'Chosen Location', 'Chosen Price'];
  const outRows = rows.map((row, i) => {
    const d = decisions[i];
    return { ...row, 'Chosen Location': d?.chosenLocation ?? '', 'Chosen Price': d?.chosenPrice ?? '' };
  });
  const csv = [headers.join(',')].concat(outRows.map(r => headers.map(h => csvEscape(r[h])).join(','))).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const file = new File([blob], 'price-decisions.csv', { type: 'text/csv' });

  if (navigator.share && navigator.canShare) {
    try {
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'price-decisions.csv' });
        showToast('Shared CSV');
        return;
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'price-decisions.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('CSV saved');
}

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('saveBtn').addEventListener('click', saveFile);

loadState();
render();
</script>
